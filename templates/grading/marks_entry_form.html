<!-- templates/grading/marks_entry_form.html -->
<h2>Marks Entry</h2>
<form method="get">
    {{ form.as_p }}
    <button type="submit">Load Students</button>
</form>

{% if students %}
<hr>
<form method="post">
    {% csrf_token %}
    <table>
        <thead>
            <tr>
                <th>Adm No</th>
                <th>Name</th>
                <th>Marks</th>
            </tr>
        </thead>
        <tbody>
            {% for student in students %}
            <tr>
                <td>{{ student.AdmNo }}</td>
                <td>{{ student.full_name }}</td>
                <td><input type="number" name="marks_{{ student.id }}" step="0.01" required></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <button type="submit">Save Marks</button>
</form>
{% endif %}
