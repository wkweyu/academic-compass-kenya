<!-- templates/exams/exam_form.html -->
{% extends "base.html" %}

{% block title %}Add Exam{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto mt-6">
    <h2 class="text-xl font-bold mb-4">Add Exam</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Save Exam</button>
    </form>
    <a href="{% url 'exams:exam_list' %}" class="btn mt-4">← Back</a>
</div>
{% endblock %}
