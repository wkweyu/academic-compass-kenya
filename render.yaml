services:
  - type: web
    name: academic-compass-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    preDeployCommand: python manage.py migrate
    startCommand: gunicorn skooltrack_pro.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.2
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: localhost,127.0.0.1,academic-compass-api.onrender.com
      - key: SUPABASE_DB_URL
        value: postgresql://postgres.basvqricgupbxgznsfms:GOlZg5rNtbXDmuTW@aws-0-eu-north-1.pooler.supabase.com:5432/postgres?sslmode=require
      - key: SUPABASE_URL
        value: https://basvqricgupbxgznsfms.supabase.co
      - key: SUPABASE_ANON_KEY
        value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhc3ZxcmljZ3VwYnhnem5zZm1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQwMzc2NzAsImV4cCI6MjA2OTYxMzY3MH0.NMw_FM-eJUHTg1t7xWtjbiYQtQ-iscj3oq_HxXQHWsY
      - key: FRONTEND_URL
        value: https://academic-compass-web.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://academic-compass-web.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://academic-compass-web.onrender.com,https://academic-compass-api.onrender.com
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: Lax
      - key: SECURE_SSL_REDIRECT
        value: "true"
      - key: DB_SSL_REQUIRE
        value: "true"

  - type: web
    name: academic-compass-web
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://academic-compass-api.onrender.com
      - key: VITE_SUPABASE_URL
        value: https://basvqricgupbxgznsfms.supabase.co
      - key: VITE_SUPABASE_ANON_KEY
        value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhc3ZxcmljZ3VwYnhnem5zZm1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQwMzc2NzAsImV4cCI6MjA2OTYxMzY3MH0.NMw_FM-eJUHTg1t7xWtjbiYQtQ-iscj3oq_HxXQHWsY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: VITE_API_URL
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false